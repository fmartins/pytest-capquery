name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        # Bypass 'make setup' since python is already installed.
        # Create the .venv manually so downstream Makefile targets work.
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -U pip
          ./.venv/bin/pip install -e '.[test]'

      - name: Check code formatting
        run: make check-format

      - name: Run unit tests
        run: make test-unit

      - name: Run E2E tests and strict dialect matrix
        run: make test-e2e
