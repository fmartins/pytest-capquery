services:
  postgres:
    image: postgres:15-alpine
    container_name: capquery_postgres
    environment:
      POSTGRES_DB: capquery_test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d capquery_test']
      interval: 5s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: capquery_mysql
    environment:
      MYSQL_DATABASE: capquery_test
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 5
